name: "Affiliate Agent Performance Analyst - Nanoplasticity Agent"

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the agent to perform"
        required: true
        type: string
      run_id:
        description: "Run ID from Nanoplasticity platform"
        required: true
        type: string
      callback_url:
        description: "Callback URL to post results"
        required: false
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt 2>/dev/null || true
      - name: Run agent
        env:
          TASK: ${{ inputs.task }}
          RUN_ID: ${{ inputs.run_id }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent.* 2>/dev/null || python main.* 2>/dev/null || python run.*
