name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: false
        default: "deploy"

permissions:
  contents: read

env:
  OPENAI_MODEL: gpt-4o

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Lint
        run: ruff check src/
      - name: Test
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t affiliate-agent-performance-analyst:latest .
      - name: Smoke test
        run: docker run --rm affiliate-agent-performance-analyst:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install .
      - name: Verify CLI
        run: performance-analyst --help
      - name: Validate nanoplasticity.json
        run: python3 -m json.tool nanoplasticity.json > /dev/null
      - name: Verify agent entrypoint
        run: python3 -c "import agent; print('agent.py importable')"
