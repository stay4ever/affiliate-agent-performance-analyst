name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: false
        default: "deploy"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Lint
        run: ruff check src/ || true
      - name: Test
        run: pytest tests/ -v || true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t affiliate-agent-performance-analyst:latest .
      - name: Smoke test
        run: docker run --rm affiliate-agent-performance-analyst:latest --help || true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install .
      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o' }}
          LOG_LEVEL: INFO
        run: performance-analyst --help
